name: Build WPF App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Cho phép anh hai bấm chạy thủ công trên web

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x' # Tùy chỉnh theo version .NET anh hai dùng, mặc định trên codespace thường là 8.0

    - name: Build and Publish
      # Chui vào thư mục PhoiLo và build ra file .exe duy nhất
      run: |
        cd PhoiLo
        dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ../publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: PhoiLo-App
        path: publish/